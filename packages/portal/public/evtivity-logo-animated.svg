<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!--
    Both gaps are centered on the line that passes through the bolt's two
    apexes (top apex 67.6,22 and bottom apex 54.3,98). All four gap edges
    are parallel to that line. A straight line from one apex to the other
    passes cleanly through the centers of both gap openings.
  -->
  <defs>
    <mask id="logoRingGaps">
      <rect width="120" height="120" fill="white"/>
      <!-- Top gap parallelogram, centered on the apex line -->
      <polygon points="68.82,-8.24 76.70,-6.86 69.82,32.54 61.94,31.16" fill="black"/>
      <!-- Bottom gap parallelogram, centered on the apex line -->
      <polygon points="52.08,87.46 59.96,88.84 53.08,128.24 45.20,126.86" fill="black"/>
    </mask>

    <style>
      @keyframes evtivity-logo-spin {
        0%   { transform: rotate(0deg); }
        12%  { transform: rotate(360deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes evtivity-logo-pulse {
        0%, 100% { fill: #22c55e; transform: scale(0.95); filter: drop-shadow(0 0 0 rgba(34, 197, 94, 0)); }
        50%      { fill: #16a34a; transform: scale(0.9); filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.7)); }
      }
      .evtivity-logo-ring {
        transform-origin: 60px 60px;
        animation: evtivity-logo-spin 10s ease-in-out infinite;
      }
      .evtivity-logo-bolt {
        transform-origin: 60px 60px;
        transform: scale(0.95);
        fill: #22c55e;
        animation: evtivity-logo-pulse 5s ease-in-out infinite;
      }
      @media (prefers-reduced-motion: reduce) {
        .evtivity-logo-ring { animation: none; }
        .evtivity-logo-bolt { animation: none; }
      }
    </style>
  </defs>

  <!-- Ring: one quick spin every 10 seconds -->
  <g class="evtivity-logo-ring">
    <circle cx="60" cy="60" r="50" fill="none" stroke="#22c55e" stroke-width="12" mask="url(#logoRingGaps)"/>
  </g>

  <!-- Lightning bolt: slow subtle pulse (darken + glow) -->
  <path class="evtivity-logo-bolt" d="M68 20L38 68h22l-6 32 30-48H62l6-32z"/>
</svg>
