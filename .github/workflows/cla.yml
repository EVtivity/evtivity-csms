name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' && github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        with:
          path-to-document: 'CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],renovate[bot]'
          custom-notsigned-prcomment: 'Thank you for your contribution. Before we can merge this PR, you need to sign the Contributor License Agreement (CLA.md). To sign, please comment on this PR with: `I have read the CLA Document and I hereby sign the CLA`. This is a one-time requirement.'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          lock-pullrequest-aftermerge: false
